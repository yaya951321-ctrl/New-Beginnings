<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Planner · 我的生活管理</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<!-- tabler icons removed, using emoji -->
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:#ede8df;color:#2a2018}
body{display:flex;align-items:flex-start;justify-content:center;padding:24px 16px}
.app{width:100%;max-width:900px;background:#f7f3ee;border-radius:20px;overflow:hidden;border:1px solid #ddd5c8}
.layout{display:grid;grid-template-columns:210px 1fr;min-height:640px}

/* ── Sidebar ── */
.sidenav{background:#2d4a3e;display:flex;flex-direction:column;position:relative;overflow:hidden;transition:background .3s}
.sidenav.personal{background:#4a3d6e}
.sidenav-bg{position:absolute;inset:0;pointer-events:none;opacity:.13}
.brand{padding:18px 16px 14px;position:relative;z-index:1;border-bottom:1px solid rgba(255,255,255,.12)}
.brand-name{font-family:'DM Serif Display',serif;font-size:18px;color:#fff;letter-spacing:-.3px;display:flex;align-items:center;gap:7px}
.brand-sub{font-size:10px;color:rgba(255,255,255,.45);margin-top:3px;letter-spacing:.04em}

/* Mode toggle */
.mode-toggle{display:flex;margin:12px 14px 6px;background:rgba(0,0,0,.2);border-radius:10px;padding:3px;gap:3px;position:relative;z-index:1}
.mode-btn{flex:1;padding:6px 4px;border:none;background:none;border-radius:8px;font-size:11px;color:rgba(255,255,255,.55);cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:4px}
.mode-btn.on{background:rgba(255,255,255,.2);color:#fff}

.nav-items{padding:6px 0;flex:1;position:relative;z-index:1}
.nav-section-label{font-size:10px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.08em;font-weight:500;padding:10px 16px 3px}
.nav-btn{display:flex;align-items:center;gap:9px;padding:10px 16px;font-size:14px;color:rgba(255,255,255,.7);cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:'DM Sans',sans-serif;transition:all .12s}
.nav-btn:hover{background:rgba(255,255,255,.1);color:#fff}
.nav-btn.on{background:rgba(255,255,255,.18);color:#fff}
.ni{font-size:14px;color:rgba(255,255,255,.45)}
.nav-btn.on .ni,.nav-btn:hover .ni{color:rgba(255,255,255,.85)}
.nav-footer{padding:12px 16px;border-top:1px solid rgba(255,255,255,.1);position:relative;z-index:1}
.nav-footer-text{font-size:10px;color:rgba(255,255,255,.28);line-height:1.6}

/* ── Main ── */
.main-area{display:flex;flex-direction:column;min-width:0;background:#f7f3ee;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 22px 12px;border-bottom:1px solid #d9d0c4;background:#f2ece4;position:relative;overflow:hidden}
.topbar-deco{position:absolute;right:0;top:0;bottom:0;width:160px;pointer-events:none;opacity:.06}
.tb-left{position:relative;z-index:1}
.tb-title{font-family:'DM Serif Display',serif;font-size:22px;letter-spacing:-.3px;display:flex;align-items:center;gap:8px;white-space:nowrap}
.tb-date{font-size:11px;color:#aaa;margin-top:2px}
.tb-mode-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;margin-left:4px;white-space:nowrap;flex-shrink:0}
.badge-work{background:#e8f0ec;color:#2d4a3e}
.badge-personal{background:#ede8f5;color:#4a3d6e}
.add-btn{background:#2d4a3e;color:#fff;border:none;border-radius:9px;padding:7px 13px;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;display:flex;align-items:center;gap:5px;font-weight:500;position:relative;z-index:1;transition:background .2s}
.add-btn:hover{background:#3d6354}
.add-btn.personal{background:#4a3d6e}
.add-btn.personal:hover{background:#5e4e8a}
.ghost-btn{background:none;border:1px solid #ddd;border-radius:9px;padding:6px 12px;font-size:12px;color:#666;cursor:pointer;font-family:'DM Sans',sans-serif}
.ghost-btn:hover{background:#f3f2ef}
.content-area{padding:18px 22px;flex:1;position:relative;overflow-y:auto}
.content-deco{position:absolute;bottom:0;right:0;pointer-events:none;opacity:.04;z-index:0}
.pane{display:none;position:relative;z-index:1}
.pane.on{display:block}
.mob-topbar,.mob-bottom-nav{display:none}

/* ── Chips & categories ── */
.chip{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500;flex-shrink:0;white-space:nowrap;display:inline-flex;align-items:center;gap:3px}
.cg{background:#e8f0ec;color:#2d4a3e}.ck{background:#f5f0e8;color:#5c3f10}
.cw{background:#fdf0ea;color:#c45c2a}.cs{background:#e8ecf3;color:#2a3a52}
.cp{background:#f2eefb;color:#5a3a9a}.ch{background:#fce8f0;color:#8a2255}
.cy{background:#fefce8;color:#854d0e}

/* ── Calendar ── */
.cal-nav{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.cal-month-lbl{font-family:'DM Serif Display',serif;font-size:17px;letter-spacing:-.2px;flex:1}
.icon-btn{width:28px;height:28px;border-radius:7px;background:none;border:1px solid #ddd;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#777;font-size:18px;font-weight:300;line-height:1}
.icon-btn:hover{background:#f3f2ef}
.wday-row{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:3px}
.wd{font-size:11px;color:#b0a090;text-align:center;padding:3px 0;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.days-g{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.day{min-height:62px;padding:5px 6px;border-radius:7px;cursor:pointer;transition:background .1s}
.day:hover{background:#eae8e2}
.day.dimmed .dnum{color:#d5d3ce}
.day.tod{background:#e8f0ec}
.day.tod .dnum-ring{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;background:#2d4a3e;color:#fff;border-radius:50%;font-size:11px;font-weight:500}
.dnum{font-size:14px;color:#8a7d6e;margin-bottom:3px}
.epill{font-size:10px;padding:2px 5px;border-radius:4px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;display:flex;align-items:center;gap:2px}
.eg{background:#d4ebe0;color:#1a4a35}.ec{background:#fde0d3;color:#7a2a10}
.ek{background:#f0e8d4;color:#5c3f10}.es{background:#dde4ed;color:#2a3a52}
.er{background:#f5d8e0;color:#6b1f35}.ep{background:#ede8f5;color:#4a2d7a}

/* ── Forms ── */
.form-box{background:#ede7de;border-radius:14px;padding:16px;margin-bottom:14px;border:1px solid #d4c9bc}
.frow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.frow input,.frow select,.frow textarea{flex:1;min-width:90px;background:#f7f2eb;border:1px solid #cec4b5;border-radius:9px;padding:8px 11px;font-size:13px;color:#2a2018;font-family:'DM Sans',sans-serif;outline:none}
.frow input::placeholder,.frow textarea::placeholder{color:#ccc}
.frow input:focus,.frow select:focus,.frow textarea:focus{border-color:#4a7c65}
.fact{display:flex;gap:8px}

/* ── Tasks ── */
.tg{margin-bottom:20px}
.tg-head{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.tg-icon{font-size:14px}
.tg-name{font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#aaa}
.tg-ct{font-size:11px;color:#ccc}
.task-row{display:flex;align-items:center;gap:9px;padding:12px 14px;background:#fdf9f5;border:1px solid #ddd5c8;border-radius:12px;margin-bottom:5px;transition:all .12s}
.task-row:hover{border-color:#c8c5be}
.task-row.done{opacity:.38}
.task-row.done .ttitle{text-decoration:line-through}
.ring{width:20px;height:20px;border-radius:50%;border:1.5px solid #ddd;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:11px;transition:all .15s;background:#fff}
.ring:hover{border-color:#4a7c65;background:#f0f8f4}
.ring.ticked{background:#2d4a3e;border-color:#2d4a3e;color:#fff}
.ring.ticked::after{content:'✓';font-size:11px;color:#fff;font-weight:700}
.ttitle{font-size:15px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tdue{font-size:12px;color:#b0a090;white-space:nowrap}
.xbtn{background:none;border:none;color:#ddd;cursor:pointer;font-size:13px;padding:0 2px;line-height:1;flex-shrink:0;transition:color .12s}
.xbtn:hover{color:#c45c2a}
.done-banner{background:#e8f0ec;border:1px solid #b8d9c8;border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:8px;font-size:13px;color:#2d4a3e}

/* ── Goals ── */
.goal-card{background:#fdf9f5;border:1px solid #ddd5c8;border-radius:16px;padding:16px;margin-bottom:10px;position:relative;overflow:hidden;transition:border-color .12s}
.goal-card:hover{border-color:#c8c5be}
.goal-card-deco{position:absolute;right:-10px;bottom:-10px;pointer-events:none;opacity:.05}
.goal-name{font-family:'DM Serif Display',serif;font-size:17px;letter-spacing:-.2px;margin-bottom:2px;display:flex;align-items:center;gap:7px}
.goal-meta{font-size:11px;color:#aaa;margin-bottom:8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.ptrack{height:6px;background:#ddd5c8;border-radius:3px;overflow:hidden;margin-bottom:10px}
.pfill{height:5px;background:#2d4a3e;border-radius:3px;transition:width .5s}
.pfill.full{background:#4a9e6e}
.pct-label{font-size:10px;color:#aaa;text-align:right;margin-bottom:4px}
.msrow{display:flex;align-items:center;gap:9px;font-size:12px;color:#666;padding:5px 0;border-bottom:1px solid #f5f4f1}
.msrow:last-child{border-bottom:none}
.msdot{width:16px;height:16px;border-radius:50%;border:1.5px solid #ddd;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;cursor:pointer;transition:all .15s}
.msdot:hover{border-color:#4a7c65;background:#f0f8f4}
.msdot.hit{background:#2d4a3e;border-color:#2d4a3e;color:#fff}
.msdot.hit::after{content:'✓';font-size:9px;color:#fff;font-weight:700}
.ms-done-label{font-size:10px;color:#4a9e6e;font-weight:500;background:#eaf5f0;padding:1px 6px;border-radius:10px}
.goal-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}

/* ── DIARY ── */
.diary-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.diary-date-nav{display:flex;align-items:center;gap:10px}
.diary-date-lbl{font-family:'DM Serif Display',serif;font-size:15px;letter-spacing:-.2px}
.diary-card{background:#fdf9f5;border:1px solid #ddd5c8;border-radius:16px;padding:18px;margin-bottom:12px}
.diary-section-title{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:#aaa;margin-bottom:10px;display:flex;align-items:center;gap:5px}
.mood-row{display:flex;gap:8px;margin-bottom:4px;flex-wrap:wrap}
.mood-btn{padding:8px 14px;border-radius:20px;border:1.5px solid #d4c9bc;background:#f7f2eb;cursor:pointer;font-size:18px;transition:all .15s;font-family:'DM Sans',sans-serif}
.mood-btn:hover{border-color:#c8c5be;transform:scale(1.1)}
.mood-btn.sel{border-color:#2d4a3e;background:#dff0e8;transform:scale(1.15)}
.diary-q{margin-bottom:12px}
.diary-q-label{font-size:12px;color:#888;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.diary-q textarea{width:100%;background:#f2ebe1;border:1px solid #d4c9bc;border-radius:8px;padding:9px 11px;font-size:13px;color:#2a2018;font-family:'DM Sans',sans-serif;resize:vertical;min-height:58px;outline:none;line-height:1.5}
.diary-q textarea:focus{border-color:#4a7c65}
.diary-save-btn{width:100%;background:#2d4a3e;color:#fff;border:none;border-radius:10px;padding:10px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;font-weight:500;margin-top:4px;transition:background .15s}
.diary-save-btn:hover{background:#3d6354}
.diary-history-item{background:#fdf9f5;border:1px solid #ddd5c8;border-radius:14px;padding:14px;margin-bottom:8px}
.dhi-date{font-size:11px;color:#aaa;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.dhi-mood{font-size:18px}
.dhi-q{font-size:12px;color:#888;margin-bottom:2px}
.dhi-a{font-size:13px;color:#444;margin-bottom:8px;line-height:1.4}
.dhi-a:last-child{margin-bottom:0}

/* ── LEDGER ── */
.ledger-tabs{display:flex;gap:0;margin-bottom:16px;background:#e8e0d5;border-radius:10px;padding:3px}
.ltab{flex:1;padding:7px;text-align:center;font-size:12px;color:#888;cursor:pointer;border-radius:8px;border:none;background:none;font-family:'DM Sans',sans-serif;transition:all .15s}
.ltab.on{background:#f7f2eb;color:#2a2018;font-weight:500;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.budget-bar-wrap{margin-bottom:16px}
.budget-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;font-size:12px}
.budget-label{color:#666;display:flex;align-items:center;gap:5px}
.budget-nums{color:#aaa}
.budget-nums span{color:#1a1a1a;font-weight:500}
.btrack{height:8px;background:#ddd5c8;border-radius:4px;overflow:hidden;margin-bottom:10px}
.bfill{height:7px;border-radius:4px;transition:width .4s}
.bfill.ok{background:#4a9e6e}
.bfill.warn{background:#e8a020}
.bfill.over{background:#d04040}
.exp-list{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.exp-row{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#fdf9f5;border:1px solid #ddd5c8;border-radius:12px}
.exp-row:hover{border-color:#c8c5be}
.exp-emoji{font-size:18px;flex-shrink:0}
.exp-info{flex:1;min-width:0}
.exp-title{font-size:15px;color:#2a2018;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.exp-meta{font-size:11px;color:#aaa;margin-top:1px;display:flex;align-items:center;gap:5px}
.pay-badge{font-size:10px;padding:1px 6px;border-radius:10px;font-weight:500}
.pay-cash{background:#fef9e8;color:#8a6d3b}
.pay-card{background:#e8f0fb;color:#2a4a8a}
.pay-mobile{background:#f2eefb;color:#5a3a9a}
.exp-amt{font-size:16px;font-weight:500;color:#2a2018;white-space:nowrap}
.exp-date{font-size:11px;color:#ccc}
.cal-sum-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;margin-bottom:4px}
.cs-day{min-height:52px;padding:4px 5px;border-radius:6px;cursor:pointer;transition:background .1s}
.cs-day:hover{background:#eae8e2}
.cs-day.tod{background:#e8f0ec}
.cs-day.has-exp .cs-dnum{color:#2d4a3e;font-weight:500}
.cs-dnum{font-size:11px;color:#aaa}
.cs-amt{font-size:10px;color:#c45c2a;font-weight:500;margin-top:2px}
.cs-day.dimmed .cs-dnum{color:#ddd}
.month-total-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#fdf9f5;border:1px solid #ddd5c8;border-radius:12px;margin-bottom:14px}
.mt-label{font-size:12px;color:#888}
.mt-num{font-family:'DM Serif Display',serif;font-size:18px;color:#1a1a1a}
.mt-sub{font-size:11px;color:#aaa;margin-top:1px}
.cat-breakdown{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.cb-row{display:flex;align-items:center;gap:8px}
.cb-label{font-size:12px;color:#666;width:80px;flex-shrink:0;display:flex;align-items:center;gap:4px}
.cb-bg{flex:1;height:5px;background:#eae8e2;border-radius:3px;overflow:hidden}
.cb-fill{height:5px;border-radius:3px;background:#2d4a3e}
.cb-amt{font-size:11px;color:#888;width:55px;text-align:right;flex-shrink:0}

/* ── Overview ── */
.stats-g{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.sbox{background:#fdf9f5;border:1px solid #ddd5c8;border-radius:14px;padding:13px 14px;position:relative;overflow:hidden}
.sbox-deco{position:absolute;right:-8px;bottom:-8px;pointer-events:none;opacity:.06}
.sbox-icon{font-size:20px;margin-bottom:4px;display:block}
.snum{font-family:'DM Serif Display',serif;font-size:26px;letter-spacing:-.5px}
.slbl{font-size:12px;color:#a09080;margin-top:1px}
.ssub{font-size:11px;color:#2d4a3e;margin-top:3px;font-weight:500}
.ov-sec{margin-bottom:16px}
.ov-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:#bbb;font-weight:500;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.ov-row{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.ov-name{font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:center;gap:5px}
.ov-bg{flex:1.5;height:5px;background:#ddd5c8;border-radius:3px;overflow:hidden}
.ov-bar{height:4px;background:#2d4a3e;border-radius:3px;transition:width .4s}
.ov-pct{font-size:11px;color:#bbb;min-width:28px;text-align:right}
.empty{font-size:12px;color:#ccc;font-style:italic;padding:6px 0}

/* ── Toast ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);background:#2d4a3e;color:#fff;padding:8px 16px;border-radius:20px;font-size:12px;opacity:0;transition:all .25s;pointer-events:none;z-index:999;white-space:nowrap;display:flex;align-items:center;gap:6px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Modal ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal-sheet{background:#f7f2eb;border-radius:20px 20px 0 0;padding:20px 20px 32px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 16px}
.modal-title{font-family:'DM Serif Display',serif;font-size:16px;margin-bottom:13px;display:flex;align-items:center;gap:7px}
.modal-frow{display:flex;flex-direction:column;gap:9px;margin-bottom:13px}
.modal-frow input,.modal-frow select,.modal-frow textarea{width:100%;background:#f2ebe1;border:1px solid #cec4b5;border-radius:10px;padding:11px 13px;font-size:14px;color:#2a2018;font-family:'DM Sans',sans-serif;outline:none}
.modal-frow input:focus,.modal-frow select:focus,.modal-frow textarea:focus{border-color:#4a7c65}
.modal-actions{display:flex;gap:10px}
.modal-save{flex:1;background:#2d4a3e;color:#fff;border:none;border-radius:10px;padding:12px;font-size:14px;font-family:'DM Sans',sans-serif;cursor:pointer;font-weight:500}
.modal-cancel{background:none;border:1px solid #ddd;border-radius:10px;padding:12px 18px;font-size:14px;color:#666;cursor:pointer;font-family:'DM Sans',sans-serif}

/* ── MOBILE ── */
@media(max-width:640px){
  .mob-nav-btn svg{width:22px;height:22px;display:block;flex-shrink:0;color:inherit;stroke:currentColor}
  .mob-nav-btn{color:#c4b5a5}
  .mob-nav-btn.on{color:#6b4f3a}
  .mob-nav-btn.on svg{stroke:#6b4f3a}
  .mob-nav-btn svg *{stroke:inherit;fill:none!important}

  body{padding:0;align-items:stretch;background:#ede8df}
  .app{max-width:100%;border-radius:0;border:none;min-height:100dvh;display:flex;flex-direction:column;background:#f7f3ee}
  .layout{display:flex;flex-direction:column;flex:1;min-height:0}
  .sidenav{display:none}
  .main-area{flex:1;display:flex;flex-direction:column;min-height:0}
  .topbar{display:none}
  .mob-topbar{display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid #d9d0c4;background:#f2ece4;position:sticky;top:0;z-index:10;gap:8px;height:52px;box-sizing:border-box;overflow:hidden}
  .mob-title{font-family:'DM Serif Display',serif;font-size:18px;letter-spacing:-.2px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#3a2a1e;line-height:1.2}
  .mob-mode-toggle{display:flex;background:#e0d8ce;border-radius:8px;padding:2px;gap:2px;flex-shrink:0}

/* ── Check-in ── */
.ci-tabs{display:flex;gap:0;margin-bottom:16px;background:#e8e0d5;border-radius:10px;padding:3px}

.habit-row.checked .habit-check{background:#2d4a3e;border-color:#2d4a3e;color:#fff}

.habit-emoji{font-size:18px;flex-shrink:0}
.habit-name{font-size:13px;color:#1a1a1a;flex:1}

.ci-save-btn{width:100%;background:#2d4a3e;color:#fff;border:none;border-radius:10px;padding:10px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;font-weight:500;margin-top:4px}

.ci-date-nav{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.ci-date-lbl{font-family:'DM Serif Display',serif;font-size:15px;flex:1}

// ── Calendar ─────────────────────────────────────────────────
function renderCal(){
  document.getElementById('cal-lbl').textContent=CY+'年 '+MNC[CM];
  const first=new Date(CY,CM,1).getDay(),dim=new Date(CY,CM+1,0).getDate(),dprev=new Date(CY,CM,0).getDate();
  let cells=[];
  for(let i=first-1;i>=0;i--) cells.push({d:dprev-i,m:'p'});
  for(let i=1;i<=dim;i++) cells.push({d:i,m:'c'});
  while(cells.length%7!==0) cells.push({d:cells.length-(first+dim)+1,m:'n'});
  const modeEvs=events.filter(e=>e.mode===mode||!e.mode);
  document.getElementById('days-g').innerHTML=cells.map(c=>{
    const mo=c.m==='c'?CM:c.m==='p'?CM-1:CM+1;
    const yo=c.m==='p'&&CM===0?CY-1:c.m==='n'&&CM===11?CY+1:CY;
    const ds=fd(yo,mo,c.d);
    const de=modeEvs.filter(e=>e.date===ds);
    const isTod=ds===TODAY;
    const dnumHTML=isTod?'<span class="dnum-ring">'+c.d+'</span>':'<span>'+c.d+'</span>';
    return '<div class="day'+(c.m!=='c'?' dimmed':'')+(isTod?' tod':'')+(de.length?' has-event':'')+'" onclick="pickDay(\''+ds+'\')">'
      +'<div class="dnum">'+dnumHTML+'</div>'
      +de.slice(0,2).map(e=>'<div class="epill '+evCfg[e.col].cls+'" onclick="event.stopPropagation();editEvent('+e.id+')" style="cursor:pointer"><span>'+evCfg[e.col].emoji+'</span>'+e.title+' ✏️</div>').join('')+'</div>';
  }).join('');
}
function shiftM(d){CM+=d;if(CM<0){CM=11;CY--}if(CM>11){CM=0;CY++}renderCal()}
function pickDay(ds){
  if(isMob()){openMobModal();setTimeout(()=>{const el=document.getElementById('m-cf-d');if(el)el.value=ds},50);}
  else{document.getElementById('cf-d').value=ds;document.getElementById('cal-form').style.display='block';}
}
function saveCal(mob){
  const t=(mob?document.getElementById('m-cf-t'):document.getElementById('cf-t')).value.trim();
  const d=(mob?document.getElementById('m-cf-d'):document.getElementById('cf-d')).value;
  if(!t||!d)return;
  const col=(mob?document.getElementById('m-cf-c'):document.getElementById('cf-c')).value;
  const tm=(mob?document.getElementById('m-cf-tm'):document.getElementById('cf-tm')).value||'00:00';
  events.push({id:eid++,title:t,date:d,time:tm,col,mode});
  save(SK.ev,events);
  if(mob)closeMobModal();else{document.getElementById('cf-t').value='';document.getElementById('cal-form').style.display='none';}
  renderCal();toast('行程已加入 '+evCfg[col].emoji);
}

function renderTasks(){
  const cfg=mode==='work'?workTaCfg:persTaCfg;
  const modeTasks=tasks.filter(t=>t.mode===mode||!t.mode);
  const allDone=modeTasks.length>0&&modeTasks.every(t=>t.done);
  let html='';
  if(allDone) html='<div class="done-banner"><span style="font-size:20px">🎉</span>所有任務都完成了，太棒了！</div>';
  ['w','m','q'].forEach(hz=>{
    const list=modeTasks.filter(t=>t.hz===hz);
    if(!list.length)return;

function renderGoals(){
  const cfg=mode==='work'?workGoCfg:persGoCfg;

  el.innerHTML=modeGoals.map(g=>{
    const c=cfg[g.cat]||cfg.g;

    const full=pct===100;
    const ms=g.ms.map((m,i)=>{
      const done=i<g.prog;
      return '<div class="msrow"><div class="msdot'+(done?' hit':'')+'" onclick="advMs('+g.id+','+i+')"></div>'
        +'<span style="flex:1'+(done?';color:#aaa;text-decoration:line-through':'')+'">'+m+'</span>'
        +(done?'<span class="ms-done-label">完成 ✓</span>':'')+'</div>';

      +'<div class="goal-top"><div style="flex:1"><div class="goal-name"><span>'+c.emoji+'</span>'+g.name+(full?' 🎉':'')+'</div>'

      +'<button class="action-menu-btn" onclick="showActionMenu(event,\'goal\','+g.id+')">⋯</button></div>'

      +'<div class="ptrack"><div class="pfill'+(full?' full':'')+'" style="width:'+pct+'%"></div></div>'+ms+'</div>';

function renderIntents(entry){
  if(!entry.intents.length) return '<div style="font-size:12px;color:#ccc;font-style:italic;padding:6px 0">還沒設定，最多三件重要的事</div>';
  return entry.intents.map((it,i)=>'<div class="ci-intent-item"><div class="ci-intent-dot"></div><span style="flex:1">'+it+'</span>'
    +'<button onclick="delIntent('+i+')" style="background:none;border:none;color:#ddd;cursor:pointer;font-size:12px">✕</button></div>').join('');
}
function renderIntentsEvening(entry){
  return entry.intents.map((it,i)=>{
    const done=entry.habitsDone&&entry.habitsDone.includes('intent_'+i);
    return '<div class="ci-intent-item'+(done?' done-it':'')+'" onclick="toggleIntent('+i+')" style="cursor:pointer">'
      +'<div class="ci-intent-dot"></div><span style="flex:1">'+it+'</span>'
      +(done?'<span style="font-size:11px;color:#4a9e6e;font-weight:500">完成 ✓</span>':'<span style="font-size:11px;color:#ccc">待完成</span>')
      +'</div>';
  }).join('');
}
function renderHabits(entry){
  const done=entry.habitsDone||[];
  return getHabits().map(h=>{
    const isDone=done.includes(h.id);
    const streak=getStreak(h.id);
    return '<div class="habit-row'+(isDone?' checked':'')+'" onclick="toggleHabit(\''+h.id+'\')">'
      +'<div class="habit-check"></div>'
      +'<span class="habit-emoji">'+h.emoji+'</span>'
      +'<span class="habit-name">'+h.name+'</span>'
      +(streak>=2?'<span class="habit-streak hot">🔥'+streak+'天</span>':'<span class="habit-streak">連續 '+streak+' 天</span>')
      +'<button onclick="event.stopPropagation();delHabit(\''+h.id+'\')" style="background:none;border:none;color:#ddd;cursor:pointer;font-size:12px">✕</button>'
      +'</div>';
  }).join('');
}
function getStreak(hid){
  let streak=0,d=new Date(TODAY+'T00:00:00');
  for(let i=0;i<60;i++){
    const ds=fd(d.getFullYear(),d.getMonth(),d.getDate());
    const entry=getCheckins().find(c=>c.date===ds);
    if(entry&&entry.habitsDone&&entry.habitsDone.includes(hid)){streak++;d.setDate(d.getDate()-1);}
    else break;
  }
  return streak;
}
function getOrCreateEntry(date){
  let e=getCheckins().find(c=>c.date===date);
  if(!e){e={date,intents:[],habitsDone:[],eq1:'',eq2:'',eq3:''};getCheckins().push(e);}
  return e;
}

function renderDiary(){
  const dt=new Date(diaryDate+'T00:00:00');
  document.getElementById('diary-lbl').textContent=diaryDate+' 週'+WD[dt.getDay()];
  const entry=diaries.find(d=>d.date===diaryDate);
  if(entry){
    selMoodVal=entry.mood||'';
    document.querySelectorAll('.mood-btn').forEach(b=>b.classList.toggle('sel',b.dataset.mood===entry.mood));
    document.getElementById('dq1').value=entry.q1||'';
    document.getElementById('dq2').value=entry.q2||'';
    document.getElementById('dq3').value=entry.q3||'';
    document.getElementById('dq4').value=entry.q4||'';
  } else {
    selMoodVal='';
    document.querySelectorAll('.mood-btn').forEach(b=>b.classList.remove('sel'));
    ['dq1','dq2','dq3','dq4'].forEach(id=>document.getElementById(id).value='');
  }
  // history (past 5 entries excluding current date)
  const hist=diaries.filter(d=>d.date!==diaryDate).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);
  document.getElementById('diary-history').innerHTML=hist.length?
    '<div style="font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:#bbb;font-weight:500;margin:16px 0 8px">📖 過往記錄</div>'
    +hist.map(d=>{
      const dt2=new Date(d.date+'T00:00:00');
      return '<div class="diary-history-item">'
        +'<div class="dhi-date"><span class="dhi-mood">'+(d.mood||'📝')+'</span>'+d.date+' 週'+WD[dt2.getDay()]+'</div>'
        +(d.q1?'<div class="dhi-q">⭐ 最棒的事</div><div class="dhi-a">'+d.q1+'</div>':'')
        +(d.q2?'<div class="dhi-q">💡 學到的事</div><div class="dhi-a">'+d.q2+'</div>':'')
        +(d.q4?'<div class="dhi-q">📝 日記</div><div class="dhi-a">'+d.q4+'</div>':'')
        +'</div>';
    }).join(''):'';
}
function saveDiary(){
  const q1=document.getElementById('dq1').value.trim();
  const q2=document.getElementById('dq2').value.trim();
  const q3=document.getElementById('dq3').value.trim();
  const q4=document.getElementById('dq4').value.trim();
  if(!selMoodVal&&!q1&&!q2&&!q3&&!q4){toast('請填寫至少一項','📝');return;}
  const idx=diaries.findIndex(d=>d.date===diaryDate);
  const entry={date:diaryDate,mood:selMoodVal,q1,q2,q3,q4};
  if(idx>=0)diaries[idx]=entry;else diaries.push(entry);
  save(SK.di,diaries);toast('日記已儲存 💾');renderDiary();
}

// ── Ledger ────────────────────────────────────────────────────
function setLtab(t){
  ltab=t;
  ['day','month','budget'].forEach(k=>{document.getElementById('lt-'+k).className='ltab'+(k===t?' on':'')});
  renderLedger();
}
function renderLedger(){
  const el=document.getElementById('ledger-content');
  if(ltab==='day') el.innerHTML=renderLedgerDay();
  else if(ltab==='month') el.innerHTML=renderLedgerMonth();
  else el.innerHTML=renderBudget();
}
function renderLedgerDay(){
  // Group by date descending
  const dates=[...new Set(expenses.map(e=>e.date))].sort((a,b)=>b.localeCompare(a));
  if(!expenses.length) return '<div class="empty">尚無支出記錄，點擊「新增」開始記帳 💰</div>';
  return dates.map(d=>{
    const list=expenses.filter(e=>e.date===d);
    const total=list.reduce((s,e)=>s+e.amt,0);
    const dt=new Date(d+'T00:00:00');
    return '<div style="margin-bottom:16px">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px">'
        +'<div style="font-size:11px;color:#aaa;font-weight:500">'+d+' 週'+WD[dt.getDay()]+(d===TODAY?' · 今天':'')+'</div>'
        +'<div style="font-size:13px;font-weight:500;color:#1a1a1a">$'+total.toLocaleString()+'</div></div>'
      +'<div class="exp-list">'+list.map(e=>expHTML(e)).join('')+'</div></div>';
  }).join('');
}
function expHTML(e){
  const cat=expCatCfg[e.cat]||expCatCfg.other;
  const pay=payCfg[e.pay]||payCfg.cash;
  return '<div class="exp-row"><span class="exp-emoji">'+cat.emoji+'</span>'
    +'<div class="exp-info"><div class="exp-title">'+e.title+'</div>'
    +'<div class="exp-meta"><span class="pay-badge '+pay.cls+'">'+pay.label+'</span><span>'+cat.label+'</span></div></div>'
    +'<div style="text-align:right"><div class="exp-amt">$'+e.amt.toLocaleString()+'</div>'
    +'<div class="exp-date">'+e.date.slice(5).replace('-','/')+'</div></div>'
    +'<button class="edit-btn" onclick="editExp('+e.id+')" title="編輯">✏️</button>'
    +'<button class="action-menu-btn" onclick="showActionMenu(event,\'exp\','+e.id+')">⋯</button></div>';
}
function renderLedgerMonth(){
  const y=now.getFullYear(),m=now.getMonth();
  const monthExps=expenses.filter(e=>e.date.startsWith(fd(y,m,1).slice(0,7)));
  const total=monthExps.reduce((s,e)=>s+e.amt,0);
  // calendar
  const first=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate(),dprev=new Date(y,m,0).getDate();
  let cells=[];
  for(let i=first-1;i>=0;i--) cells.push({d:dprev-i,m:'p'});
  for(let i=1;i<=dim;i++) cells.push({d:i,m:'c'});
  while(cells.length%7!==0) cells.push({d:cells.length-(first+dim)+1,m:'n'});
  const calHTML='<div class="wday-row" style="margin-bottom:2px">'+'<div class="wd">日</div><div class="wd">一</div><div class="wd">二</div><div class="wd">三</div><div class="wd">四</div><div class="wd">五</div><div class="wd">六</div></div>'
    +'<div class="cal-sum-grid">'+cells.map(c=>{
      if(c.m!=='c') return '<div class="cs-day dimmed"><div class="cs-dnum" style="opacity:.3">'+c.d+'</div></div>';
      const ds=fd(y,m,c.d);
      const dayAmt=expenses.filter(e=>e.date===ds).reduce((s,e)=>s+e.amt,0);
      const isTod=ds===TODAY;
      return '<div class="cs-day'+(isTod?' tod':'')+(dayAmt?' has-exp':'')+'">'
        +'<div class="cs-dnum">'+c.d+'</div>'
        +(dayAmt?'<div class="cs-amt">$'+dayAmt+'</div>':'')+'</div>';
    }).join('')+'</div>';
  // cat breakdown
  const catBreak=Object.entries(expCatCfg).map(([k,v])=>{
    const amt=monthExps.filter(e=>e.cat===k).reduce((s,e)=>s+e.amt,0);
    return {k,v,amt};
  }).filter(x=>x.amt>0).sort((a,b)=>b.amt-a.amt);
  const maxAmt=catBreak.length?catBreak[0].amt:1;
  const cbHTML='<div class="cat-breakdown">'+catBreak.map(x=>'<div class="cb-row"><div class="cb-label"><span>'+x.v.emoji+'</span>'+x.v.label+'</div><div class="cb-bg"><div class="cb-fill" style="width:'+Math.round(x.amt/maxAmt*100)+'%"></div></div><div class="cb-amt">$'+x.amt.toLocaleString()+'</div></div>').join('')+'</div>';
  return '<div class="month-total-row"><div><div class="mt-label">'+y+'年'+(m+1)+'月 總支出</div><div class="mt-sub">'+(monthExps.length)+'筆記錄</div></div><div class="mt-num">$'+total.toLocaleString()+'</div></div>'
    +'<div style="background:#fdf9f5;border:1px solid #ddd5c8;border-radius:14px;padding:12px;margin-bottom:12px">'+calHTML+'</div>'
    +(catBreak.length?'<div style="font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:#bbb;font-weight:500;margin-bottom:8px">各類別支出</div>'+cbHTML:'');
}
function renderBudget(){
  const y=now.getFullYear(),m=now.getMonth();
  const monthExps=expenses.filter(e=>e.date.startsWith(fd(y,m,1).slice(0,7)));
  return '<div style="margin-bottom:12px;font-size:13px;color:#888">點擊金額可修改預算上限</div>'
    +'<div class="budget-bar-wrap">'+Object.entries(expCatCfg).map(([k,v])=>{
      const spent=monthExps.filter(e=>e.cat===k).reduce((s,e)=>s+e.amt,0);
      const budget=budgets[k]||0;
      const pct=budget?Math.min(Math.round(spent/budget*100),100):0;
      const cls=pct>=100?'over':pct>=80?'warn':'ok';
      return '<div class="budget-row"><div class="budget-label"><span>'+v.emoji+'</span>'+v.label+'</div>'
        +'<div class="budget-nums">$'+spent.toLocaleString()+' / <span onclick="editBudget(\''+k+'\')" style="cursor:pointer;text-decoration:underline dotted">$'+budget.toLocaleString()+'</span>'+(pct>=100?' 🔴':'')+'</div></div>'
        +'<div class="btrack"><div class="bfill '+cls+'" style="width:'+pct+'%"></div></div>';
    }).join('')+'</div>';
}
function editBudget(cat){
  const cur=budgets[cat]||0;
  const val=prompt(expCatCfg[cat].emoji+' '+expCatCfg[cat].label+' 預算上限（月）：',cur);
  if(val===null)return;
  const n=parseInt(val);
  if(isNaN(n)||n<0) return;
  budgets[cat]=n;save(SK.bg,budgets);renderLedger();toast('預算已更新 ✓');
}
function saveExp(mob){
  const t=(mob?document.getElementById('m-lf-t'):document.getElementById('lf-t')).value.trim();
  const amt=parseInt((mob?document.getElementById('m-lf-amt'):document.getElementById('lf-amt')).value);
  if(!t||isNaN(amt)||amt<=0)return;
  const cat=(mob?document.getElementById('m-lf-cat'):document.getElementById('lf-cat')).value;
  const pay=(mob?document.getElementById('m-lf-pay'):document.getElementById('lf-pay')).value;
  const d=(mob?document.getElementById('m-lf-d'):document.getElementById('lf-d')).value||TODAY;
  expenses.push({id:xid++,title:t,amt,cat,pay,date:d});
  save(SK.ex,expenses);
  if(mob)closeMobModal();else{document.getElementById('lf-t').value='';document.getElementById('lf-amt').value='';document.getElementById('ledger-add-box').style.display='none';}
  renderLedger();toast('已記錄 '+expCatCfg[cat].emoji+' $'+amt);
}
function delExp(id){expenses=expenses.filter(x=>x.id!==id);save(SK.ex,expenses);renderLedger();toast('已刪除','🗑️')}

// ── Action menu ──────────────────────────────────────────────
let amType='', amId=0;
function showActionMenu(e, type, id){
  e.stopPropagation();
  amType=type; amId=id;
  const menu=document.getElementById('action-menu');
  const overlay=document.getElementById('am-overlay');
  let items='';
  if(type==='task'){
    items='<div class="action-menu-item" onclick="amEdit()">✏️ 編輯任務</div>'
         +'<div class="action-menu-item" onclick="amToggle()">✅ 標記完成／未完成</div>'
         +'<div class="action-menu-item danger" onclick="amDelete()">🗑️ 刪除</div>';
  } else if(type==='goal'){
    items='<div class="action-menu-item" onclick="amEdit()">✏️ 編輯目標</div>'
         +'<div class="action-menu-item danger" onclick="amDelete()">🗑️ 刪除</div>';
  } else if(type==='exp'){
    items='<div class="action-menu-item" onclick="amEdit()">✏️ 編輯支出</div>'
         +'<div class="action-menu-item danger" onclick="amDelete()">🗑️ 刪除</div>';
  }
  menu.innerHTML=items;
  // position near tap
  const rect=e.target.getBoundingClientRect();
  const menuW=180, menuH=items.split('action-menu-item').length*48;
  let left=rect.right-menuW;
  let top=rect.bottom+4;
  if(left<8) left=8;
  if(top+menuH > window.innerHeight-60) top=rect.top-menuH-4;
  menu.style.left=left+'px';
  menu.style.top=top+'px';
  menu.style.display='block';
  overlay.classList.add('open');
}
function closeActionMenu(){
  document.getElementById('action-menu').style.display='none';
  document.getElementById('am-overlay').classList.remove('open');
}
function amEdit(){
  closeActionMenu();
  if(amType==='task') editTask(amId);
  else if(amType==='goal') editGoal(amId);
  else if(amType==='exp') editExp(amId);
}
function amToggle(){
  closeActionMenu();
  if(amType==='task') toggleT(amId);
}
function amDelete(){
  closeActionMenu();
  if(amType==='task') delT(amId);
  else if(amType==='goal') delG(amId);
  else if(amType==='exp') delExp(amId);
}

  openEdit('✏️ 編輯行程',

function editTask(id){

    ()=>{

      t.title=v; t.due=document.getElementById('et-d').value;
      t.cat=document.getElementById('et-c').value; t.hz=document.getElementById('et-h').value;

function editGoal(id){
  const g=goals.find(x=>x.id===id); if(!g) return;
  const cfg=mode==='work'?workGoCfg:persGoCfg;
  openEdit('✏️ 編輯目標',
    `<input id="eg-n" value="${g.name}" placeholder="目標名稱"/>
     <input id="eg-dl" value="${g.dl||''}" placeholder="期限"/>
     <select id="eg-c">${Object.entries(cfg).map(([k,v])=>`<option value="${k}"${g.cat===k?' selected':''}>${v.emoji} ${v.label}</option>`).join('')}</select>
     <input id="eg-ms" value="${g.ms.join(',')}" placeholder="里程碑，逗號分隔"/>`,
    ()=>{
      const n=document.getElementById('eg-n').value.trim(); if(!n) return;
      g.name=n; g.dl=document.getElementById('eg-dl').value;
      g.cat=document.getElementById('eg-c').value;
      g.ms=document.getElementById('eg-ms').value.split(',').map(s=>s.trim()).filter(Boolean);
      if(g.prog>g.ms.length) g.prog=g.ms.length;
      save(SK.go,goals); closeEdit(); renderGoals(); toast('目標已更新 ✓');
    }
  );

function editExp(id){
  const e=expenses.find(x=>x.id===id); if(!e) return;
  openEdit('✏️ 編輯支出',
    `<input id="ex-t" value="${e.title}" placeholder="支出說明"/>
     <input type="number" id="ex-amt" value="${e.amt}" min="0"/>

     <input type="date" id="ex-d" value="${e.date}"/>`,
    ()=>{
      const t=document.getElementById('ex-t').value.trim();
      const amt=parseInt(document.getElementById('ex-amt').value);
      if(!t||isNaN(amt)||amt<=0) return;
      e.title=t; e.amt=amt; e.cat=document.getElementById('ex-cat').value;
      e.pay=document.getElementById('ex-pay').value; e.date=document.getElementById('ex-d').value;
      save(SK.ex,expenses); closeEdit(); renderLedger(); toast('支出已更新 ✓');
    }
  );
}

function renderReminderSheet(){
  // Today's tasks with due dates
  const todayAndOverdue = tasks.filter(t => !t.done && t.due && t.due <= TODAY);
  const upcoming = tasks.filter(t => !t.done && t.due && t.due > TODAY).sort((a,b)=>a.due.localeCompare(b.due)).slice(0,5);
  const allRemind = [...todayAndOverdue, ...upcoming];
  
  const cfg = mode==='work' ? workTaCfg : persTaCfg;
  document.getElementById('reminder-today-list').innerHTML = allRemind.length
    ? allRemind.map(t => {
        const c = cfg[t.cat]||cfg.g;
        const isOverdue = t.due < TODAY;
        const isTod = t.due === TODAY;
        return '<div class="reminder-item">'
          +'<span style="font-size:18px">'+c.emoji+'</span>'
          +'<div class="reminder-item-info">'
            +'<div class="reminder-item-title">'+t.title+'</div>'
            +'<div class="reminder-item-sub">'+(isOverdue?'⚠️ 已逾期':isTod?'📅 今天到期':'📅 '+t.due.slice(5).replace('-','/'))+'</div>'
          +'</div>'
          +(isOverdue?'<span class="reminder-time-badge" style="background:#fdf0ea;color:#c45c2a">逾期</span>':'')
          +'</div>';
      }).join('')
    : '<div class="empty-reminder">沒有待辦任務 🎉</div>';

  // Alarms
  renderAlarmList();
}

function renderAlarmList(){
  const el = document.getElementById('alarm-list');
  el.innerHTML = alarms.length
    ? alarms.map((a,i) => '<div class="alarm-row">'
        +'<div class="alarm-info"><div class="alarm-label">⏰ '+(a.label||'提醒')+'</div><div class="alarm-time">'+a.time+'</div></div>'
        +'<button class="alarm-export-btn" onclick="exportToReminders('+i+')" title="匯出到提醒事項">📲</button>'
        +'<button class="alarm-del" onclick="delAlarm('+i+')">✕</button>'
        +'</div>').join('')
    : '<div class="empty-reminder" style="margin-bottom:8px">尚未設定鬧鐘</div>';
}

function addAlarm(){
  const time = document.getElementById('alarm-time-input').value;
  const label = document.getElementById('alarm-label-input').value.trim() || '該做點什麼了';
  if(!time) return;
  alarms.push({time, label});
  save('pl_alarms', alarms);
  document.getElementById('alarm-label-input').value = '';
  renderAlarmList();
  scheduleAlarms();
  toast('鬧鐘已設定 ⏰');
}

function delAlarm(i){
  alarms.splice(i,1);
  save('pl_alarms', alarms);
  renderAlarmList();
  scheduleAlarms();
}

function scheduleAlarms(){
  // Clear existing timers
  alarmTimers.forEach(t => clearTimeout(t));
  alarmTimers = [];
  
  const now2 = new Date();
  alarms.forEach(a => {
    const [h,m] = a.time.split(':').map(Number);
    const alarmTime = new Date();
    alarmTime.setHours(h, m, 0, 0);
    if(alarmTime <= now2) alarmTime.setDate(alarmTime.getDate()+1); // next day if passed
    const ms = alarmTime - now2;
    const timer = setTimeout(() => {
      showInAppAlert('⏰ '+a.label, a.time);
      // reschedule for next day
      scheduleAlarms();
    }, ms);
    alarmTimers.push(timer);
  });
}

function showInAppAlert(title, sub){
  const el = document.getElementById('in-app-alert');
  document.getElementById('alert-title').textContent = title;
  document.getElementById('alert-sub').textContent = sub;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 8000);
  // Try vibrate
  if(navigator.vibrate) navigator.vibrate([200, 100, 200]);
}


function exportToReminders(i){
  const a = alarms[i];
  const title = encodeURIComponent(a.label || 'Planner 提醒');
  // Open iPhone Reminders app directly
  window.location.href = 'x-apple-reminderkit://REMCDReminder/?title=' + title;
  setTimeout(function(){
    toast('已開啟「提醒事項」app，記得設定時間 ⏰');
  }, 800);
}

function exportAllAlarms(){
  if(!alarms.length){ toast('尚未設定鬧鐘'); return; }
  showInAppAlert('📲 提醒事項', '點每個鬧鐘旁的 📲，一鍵加入 iPhone 提醒事項');
}


function checkDailyReminders(){
  // On open: show banner if overdue tasks exist
  const overdue = tasks.filter(t => !t.done && t.due && t.due < TODAY);
  const dueToday = tasks.filter(t => !t.done && t.due && t.due === TODAY);
  if(overdue.length > 0){
    setTimeout(() => showInAppAlert('⚠️ 有 '+overdue.length+' 項逾期任務', '點任務頁面查看'), 2000);
  } else if(dueToday.length > 0){
    setTimeout(() => showInAppAlert('📅 今天有 '+dueToday.length+' 項任務到期', '記得完成哦！'), 2000);
  }
  scheduleAlarms();
}

document.getElementById('reminder-overlay').addEventListener('click', function(e){
  if(e.target===this) closeReminders();
});

// ── Greeting ─────────────────────────────────────────────────
function showGreeting(){
  const h=new Date().getHours();
  let icon,title,sub;
  if(h>=5&&h<12){icon='🌅';title='早安';sub='新的一天，從這裡開始。';}
  else if(h>=12&&h<18){icon='☀️';title='午安';sub='休息一下，繼續前行。';}
  else if(h>=18&&h<22){icon='🌙';title='晚安';sub='今天辛苦了，記得回顧一下。';}
  else{icon='🌟';title='夜深了';sub='好好休息，明天繼續努力。';}

  const quotes=[
    '每一個小進步，都值得被記錄。',
    '計劃不是束縛，而是給自己的禮物。',
    '今天完成的事，明天的自己會感謝你。',
    '不需要完美，只需要前進。',
    '專注於可以控制的事，放下無法控制的。',
    '一小步一小步，終會抵達遠方。',
    '把今天活好，就是對未來最好的投資。',
  ];
  const q=quotes[Math.floor(Math.random()*quotes.length)];

  const days=['日','一','二','三','四','五','六'];
  const now2=new Date();
  const dateStr=now2.getFullYear()+'年'+(now2.getMonth()+1)+'月'+now2.getDate()+'日 · 星期'+days[now2.getDay()];

  // Check habit streak for motivation
  const todayCheckin=getCheckins().find(c=>c.date===TODAY);
  const doneHabits=todayCheckin?(todayCheckin.habitsDone||[]).filter(id=>!id.startsWith('intent_')).length:0;
  const totalHabits=getHabits().length;
  let extraMsg='';
  if(doneHabits>0) extraMsg=' 今天已完成 '+doneHabits+'/'+totalHabits+' 個習慣 🎯';

  document.getElementById('greeting-icon').textContent=icon;
  document.getElementById('greeting-title').textContent=title+'！';
  document.getElementById('greeting-sub').textContent=sub+(extraMsg||'');
  document.getElementById('greeting-date').textContent=dateStr;
  document.getElementById('greeting-quote').textContent='「'+q+'」';
  document.getElementById('greeting-overlay').style.display='flex';
}
function closeGreeting(){
  document.getElementById('greeting-overlay').style.display='none';
}

<script>
if('serviceWorker' in navigator){
  const swCode = `
const CACHE='planner-v1';
const ASSETS=[location.pathname];
self.addEventListener('install',e=>{
  e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS)));
  self.skipWaiting();
});
self.addEventListener('activate',e=>{
  e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch',e=>{
  e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{
    const clone=res.clone();
    caches.open(CACHE).then(c=>c.put(e.request,clone));
    return res;
  })));
});
  `;
  const blob=new Blob([swCode],{type:'application/javascript'});
  const swUrl=URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}
</script>
